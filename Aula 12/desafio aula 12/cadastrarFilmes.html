<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/cadastro.css">
    <title>Cadastro filmes</title>
</head>
<body>
    <header class="header-main">
        <h1>CineFlix</h1>
        <button id="tema" class="btn-tema" onclick="trocarTema()">Dia</button>
    </header>

    <main>
        <section>
            <form>
                <fieldset>
                    <h2>Cadastre o filme que deseja</h2>
                    <input type="text" id="nomeFilme" placeholder="Digite o nome do filme" required>
                    <input type="text" id="generoFilme" placeholder="Genero.."required>
                    <input type="number" id="anoLancamento" placeholder="Ano do filme"required>
                    <button type="button"  class="btn" onclick="cadastrar()">Cadastrar</button>
                </fieldset>
            </form>

            <p id="cadastro">Filmes Cadastrados: 0</p>
           
            <ul>
                
            </ul>

        </section>


        <footer>
            <p>&copy; CineFlix 2026</p>
        </footer>
    </main>

<script src="./js/script.js"></script>
</body>
</html>
